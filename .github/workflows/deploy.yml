name: Deploy

on:
  push:
    branches: [main, versions/intervals-version]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync to deploy directory
        run: rsync -a --delete --exclude='.env' --exclude='.git' ./ /opt/triatlon-bot/src/

      - name: Copy .env
        run: cp /opt/triatlon-bot/.env.triathlon /opt/triatlon-bot/src/.env

      - name: Stop services
        working-directory: /opt/triatlon-bot/src
        run: docker compose stop api migrate

      - name: Deploy
        working-directory: /opt/triatlon-bot/src
        run: docker compose up -d --build --no-deps --remove-orphans migrate api
