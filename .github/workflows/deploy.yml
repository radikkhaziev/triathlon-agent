name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync to deploy directory
        run: rsync -a --delete --exclude='.env' --exclude='.git' ./ /opt/triatlon-bot/

      - name: Copy .env
        run: cp /home/deploy/.env.triathlon /opt/triatlon-bot/.env

      - name: Stop services
        working-directory: /opt/triatlon-bot
        run: docker compose stop bot migrate

      - name: Deploy
        working-directory: /opt/triatlon-bot
        run: docker compose up -d --build --no-deps --remove-orphans bot migrate
