<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Активности</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1c1c27;
            --border: #2a2a3a;
            --text: #e8e8ed;
            --text-dim: #8888a0;
            --accent: #3b82f6;
            --accent-glow: #3b82f620;
            --green: #22c55e;
            --yellow: #f59e0b;
            --orange: #f97316;
            --red: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding: 0 16px 32px;
            max-width: 540px;
            margin: 0 auto;
        }

        .page-header { text-align: center; padding: 20px 0 16px; }
        .page-header h1 { font-size: 20px; font-weight: 700; }

        .week-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 8px 0 12px;
        }
        .week-nav button {
            background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .week-nav button:hover { background: var(--border); }
        .week-nav button:active { transform: scale(0.97); }
        .week-label { font-size: 14px; font-weight: 600; min-width: 180px; text-align: center; }

        .sync-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 10px 0 16px;
        }
        .sync-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 8px;
            padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; font-family: inherit; display: flex; align-items: center; gap: 6px;
        }
        .sync-btn:hover { background: #2563eb; }
        .sync-btn:active { transform: scale(0.97); }
        .sync-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .sync-btn .spin { display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sync-time { font-size: 12px; color: var(--text-dim); }

        .day-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; margin-bottom: 10px; overflow: hidden;
        }
        .day-card.today { border-color: var(--accent); }
        .day-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
        }
        .day-date { font-size: 14px; font-weight: 600; }
        .today-badge {
            font-size: 10px; font-weight: 700; background: var(--accent); color: #fff;
            padding: 2px 8px; border-radius: 8px; letter-spacing: 0.5px;
        }
        .rest-day {
            padding: 0 16px 14px; font-size: 13px; color: var(--text-dim); font-style: italic;
        }

        .activity-item { border-top: 1px solid var(--border); }
        .activity-row {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            cursor: pointer; transition: background 0.15s;
        }
        .activity-row:hover { background: var(--surface-2); }
        .activity-row .chevron {
            color: var(--text-dim); font-size: 12px; transition: transform 0.2s;
            flex-shrink: 0;
        }
        .activity-row.expanded .chevron { transform: rotate(90deg); }
        .sport-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
        .activity-info { flex: 1; min-width: 0; }
        .activity-name {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .activity-meta { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

        /* Inline detail panel */
        .detail-panel {
            padding: 0 16px 14px;
            animation: fadeIn 0.15s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .detail-metrics {
            font-size: 12px; color: var(--text-dim); line-height: 1.8;
        }
        .detail-metrics strong { color: var(--text); font-weight: 600; }

        /* Zone bar */
        .zone-bar-container { margin: 6px 0 4px; }
        .zone-bar-label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
        .zone-bar {
            display: flex; height: 16px; border-radius: 4px; overflow: hidden;
            background: var(--surface-2);
        }
        .zone-bar .seg {
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 600; color: #fff; min-width: 0;
            white-space: nowrap; overflow: hidden;
        }
        .zone-legend {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 3px;
        }
        .zone-legend span { font-size: 10px; color: var(--text-dim); }
        .zone-legend .dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 2px;
            margin-right: 2px; vertical-align: middle;
        }

        .detail-link {
            display: inline-block; margin-top: 8px;
            font-size: 12px; color: var(--accent); text-decoration: none;
        }
        .detail-link:hover { text-decoration: underline; }

        .detail-loading {
            font-size: 12px; color: var(--text-dim); padding: 8px 16px 14px;
        }

        .loading-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 50vh; color: var(--text-dim); gap: 12px;
        }
        .spinner {
            width: 28px; height: 28px; border: 3px solid var(--surface-2);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 13px; color: var(--accent); text-decoration: none; padding: 12px 0 0;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<a href="/" onclick="this.href='/'+location.hash" class="back-link">&larr; Главная</a>

<div class="page-header">
    <h1>Активности</h1>
</div>

<div class="week-nav">
    <button id="prev-week">&larr; Пред</button>
    <span class="week-label" id="week-label">...</span>
    <button id="next-week">След &rarr;</button>
</div>

<div class="sync-bar" style="display:none">
    <button class="sync-btn" id="sync-btn">
        <span id="sync-icon">&#x1f504;</span> Синхронизировать
    </button>
    <span class="sync-time" id="sync-time"></span>
</div>

<div id="loading" class="loading-state">
    <div class="spinner"></div>
    <span>Загрузка...</span>
</div>

<div id="days-container" style="display:none"></div>

<script>
const API_BASE = window.API_BASE_URL || '';
const tg = window.Telegram?.WebApp;

if (tg) { tg.expand(); tg.ready(); }

if (tg?.initData) {
    sessionStorage.setItem('tg_init_data', tg.initData);
}

function getInitData() {
    return tg?.initData || sessionStorage.getItem('tg_init_data') || '';
}

const hasAuth = !!getInitData();

if (!hasAuth) {
    document.getElementById('loading').innerHTML =
        '<div style="text-align:center;color:var(--text-dim);padding:40px 20px;">' +
        'Доступ только через Telegram Mini App.</div>';
    throw new Error('No Telegram initData');
}

async function apiFetch(endpoint, opts = {}) {
    const headers = opts.headers || {};
    const initData = getInitData();
    if (initData) headers['Authorization'] = initData;
    const res = await fetch(`${API_BASE}${endpoint}`, { ...opts, headers });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    return res.json();
}

const SPORT_ICONS = {
    Swim: '\u{1F3CA}', Ride: '\u{1F6B4}', VirtualRide: '\u{1F6B4}',
    GravelRide: '\u{1F6B4}', MountainBikeRide: '\u{26F0}\uFE0F',
    Run: '\u{1F3C3}', VirtualRun: '\u{1F3C3}', TrailRun: '\u{26F0}\uFE0F',
    WeightTraining: '\u{1F3CB}\uFE0F',
};

const BIKE_TYPES = ['Ride', 'VirtualRide', 'GravelRide', 'MountainBikeRide'];
const RUN_TYPES = ['Run', 'VirtualRun', 'TrailRun'];

const WEEKDAY_RU = {
    Mon: 'Пн', Tue: 'Вт', Wed: 'Ср', Thu: 'Чт', Fri: 'Пт', Sat: 'Сб', Sun: 'Вс',
};

const MONTHS = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];

const ZONE_COLORS = ['#6b7280', '#22c55e', '#f59e0b', '#f97316', '#ef4444'];
const ZONE_LABELS = ['Z1', 'Z2', 'Z3', 'Z4', 'Z5'];

function formatWeekLabel(start, end) {
    const s = new Date(start + 'T00:00:00');
    const e = new Date(end + 'T00:00:00');
    const sm = MONTHS[s.getMonth()];
    const em = MONTHS[e.getMonth()];
    if (sm === em) return `${sm} ${s.getDate()} \u2013 ${e.getDate()}, ${s.getFullYear()}`;
    return `${sm} ${s.getDate()} \u2013 ${em} ${e.getDate()}, ${e.getFullYear()}`;
}

function formatDayDate(dateStr, weekday) {
    const d = new Date(dateStr + 'T00:00:00');
    return `${WEEKDAY_RU[weekday] || weekday} ${d.getDate()}`;
}

function relativeTime(isoStr) {
    if (!isoStr) return '';
    const diffMin = Math.floor((new Date() - new Date(isoStr)) / 60000);
    if (diffMin < 1) return 'только что';
    if (diffMin < 60) return `${diffMin} мин назад`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24) return `${diffH} ч назад`;
    return `${Math.floor(diffH / 24)} дн назад`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function sportLabel(type) {
    if (!type) return 'Activity';
    return type.replace(/([A-Z])/g, ' $1').trim();
}

function fmtPace(secPerKm) {
    if (!secPerKm || secPerKm <= 0) return null;
    const m = Math.floor(secPerKm / 60);
    const s = Math.round(secPerKm % 60);
    return `${m}:${String(s).padStart(2, '0')}/km`;
}

function fmtSpeed(ms) {
    if (!ms || ms <= 0) return null;
    return (ms * 3.6).toFixed(1) + ' km/h';
}

// ---- Detail cache ----
const detailCache = {};

function buildZoneBar(zones, label) {
    if (!zones || !zones.length) return '';
    const total = zones.reduce((a, b) => a + (b || 0), 0);
    if (total <= 0) return '';

    let html = `<div class="zone-bar-container">`;
    html += `<div class="zone-bar-label">${label}</div>`;
    html += `<div class="zone-bar">`;
    for (let i = 0; i < zones.length && i < 5; i++) {
        const v = zones[i] || 0;
        const pct = (v / total * 100);
        if (pct < 1) continue;
        const lbl = pct >= 8 ? `${ZONE_LABELS[i]} ${Math.round(pct)}%` : '';
        html += `<div class="seg" style="width:${pct}%;background:${ZONE_COLORS[i]}">${lbl}</div>`;
    }
    html += `</div>`;
    html += `<div class="zone-legend">`;
    for (let i = 0; i < zones.length && i < 5; i++) {
        const v = zones[i] || 0;
        if (v <= 0) continue;
        const mins = Math.round(v / 60);
        html += `<span><span class="dot" style="background:${ZONE_COLORS[i]}"></span>${ZONE_LABELS[i]} ${mins}m</span>`;
    }
    html += `</div></div>`;
    return html;
}

function buildInlineDetail(data) {
    const d = data.details;
    const type = data.type;
    if (!d) return '<div class="detail-metrics">Нет детальных данных</div>';

    let lines = [];

    if (BIKE_TYPES.includes(type)) {
        const parts = [];
        if (d.normalized_power) parts.push(`<strong>NP ${d.normalized_power}W</strong>`);
        if (d.intensity_factor) parts.push(`IF ${d.intensity_factor.toFixed(2)}`);
        if (d.efficiency_factor) parts.push(`EF ${d.efficiency_factor.toFixed(2)}`);
        if (d.decoupling != null) parts.push(`Decouple ${d.decoupling.toFixed(1)}%`);
        if (parts.length) lines.push(parts.join(' \u00B7 '));

        const parts2 = [];
        if (d.elevation_gain) parts2.push(`\u2B06\uFE0F ${Math.round(d.elevation_gain)}m`);
        if (d.avg_cadence) parts2.push(`\uD83D\uDD04 ${Math.round(d.avg_cadence)}rpm`);
        if (d.calories) parts2.push(`\uD83D\uDD25 ${d.calories}kcal`);
        if (parts2.length) lines.push(parts2.join(' \u00B7 '));
    } else if (RUN_TYPES.includes(type)) {
        const parts = [];
        const pace = fmtPace(d.pace);
        if (pace) parts.push(`<strong>Pace ${pace}</strong>`);
        const gap = fmtPace(d.gap);
        if (gap) parts.push(`GAP ${gap}`);
        if (d.efficiency_factor) parts.push(`EF ${d.efficiency_factor.toFixed(2)}`);
        if (d.decoupling != null) parts.push(`Decouple ${d.decoupling.toFixed(1)}%`);
        if (parts.length) lines.push(parts.join(' \u00B7 '));

        const parts2 = [];
        if (d.elevation_gain) parts2.push(`\u2B06\uFE0F ${Math.round(d.elevation_gain)}m`);
        if (d.avg_cadence) parts2.push(`\uD83D\uDC63 ${Math.round(d.avg_cadence * 2)}spm`);
        if (d.avg_stride) parts2.push(`Stride ${d.avg_stride.toFixed(2)}m`);
        if (parts2.length) lines.push(parts2.join(' \u00B7 '));
    } else if (type === 'Swim') {
        const parts = [];
        if (d.pace) {
            // Intervals.icu pace is sec/km; divide by 10 for sec/100m
            const p100 = d.pace / 10;
            const m = Math.floor(p100 / 60);
            const s = Math.round(p100 % 60);
            parts.push(`<strong>Pace ${m}:${String(s).padStart(2, '0')}/100m</strong>`);
        }
        if (d.calories) parts.push(`\uD83D\uDD25 ${d.calories}kcal`);
        if (parts.length) lines.push(parts.join(' \u00B7 '));
    } else {
        // Generic
        const parts = [];
        if (d.calories) parts.push(`\uD83D\uDD25 ${d.calories}kcal`);
        if (d.distance) parts.push(`${(d.distance / 1000).toFixed(1)}km`);
        if (parts.length) lines.push(parts.join(' \u00B7 '));
    }

    let html = '<div class="detail-metrics">';
    html += lines.join('<br>');
    html += '</div>';

    html += buildZoneBar(d.hr_zones, 'HR Zones');
    html += buildZoneBar(d.power_zones, 'Power Zones');
    html += buildZoneBar(d.pace_zones, 'Pace Zones');

    html += `<a class="detail-link" href="/activity.html?id=${encodeURIComponent(data.activity_id)}${location.hash}">Details \u2192</a>`;
    return html;
}

const _loadingIds = new Set();

async function toggleDetail(activityId) {
    const panel = document.getElementById(`detail-${activityId}`);
    const row = document.getElementById(`row-${activityId}`);

    if (panel) {
        // Toggle off
        panel.remove();
        row?.classList.remove('expanded');
        return;
    }

    // Prevent double-click while loading
    if (_loadingIds.has(activityId)) return;
    _loadingIds.add(activityId);

    row?.classList.add('expanded');

    // Show loading
    const item = row?.closest('.activity-item');
    if (!item) return;
    const loadEl = document.createElement('div');
    loadEl.id = `detail-${activityId}`;
    loadEl.className = 'detail-loading';
    loadEl.textContent = 'Загрузка...';
    item.appendChild(loadEl);

    try {
        let data = detailCache[activityId];
        if (!data) {
            data = await apiFetch(`/api/activity/${activityId}/details`);
            detailCache[activityId] = data;
        }

        const el = document.getElementById(`detail-${activityId}`);
        if (!el) return; // was toggled off while loading
        el.className = 'detail-panel';
        el.innerHTML = buildInlineDetail(data);
    } catch (err) {
        console.error('Failed to load details:', err);
        const el = document.getElementById(`detail-${activityId}`);
        if (el) {
            el.className = 'detail-panel';
            el.innerHTML = '<div class="detail-metrics">Не удалось загрузить детали</div>';
        }
    } finally {
        _loadingIds.delete(activityId);
    }
}

let currentOffset = 0;

async function loadWeek(offset) {
    currentOffset = offset;
    const container = document.getElementById('days-container');
    const loading = document.getElementById('loading');

    loading.style.display = 'flex';
    container.style.display = 'none';

    try {
        const data = await apiFetch(`/api/activities-week?week_offset=${offset}`);

        document.getElementById('week-label').textContent = formatWeekLabel(data.week_start, data.week_end);
        updateSyncTime(data.last_synced_at);

        // Show sync button only for owner
        document.querySelector('.sync-bar').style.display = data.role === 'owner' ? 'flex' : 'none';

        const todayStr = data.today;
        let html = '';

        for (const day of data.days) {
            const isToday = day.date === todayStr;
            html += `<div class="day-card${isToday ? ' today' : ''}">`;
            html += `<div class="day-header">`;
            html += `<div><span class="day-date">${formatDayDate(day.date, day.weekday)}</span></div>`;
            if (isToday) html += `<span class="today-badge">СЕГОДНЯ</span>`;
            html += `</div>`;

            const isFuture = day.date > todayStr;
            if (day.activities.length === 0) {
                if (!isFuture) {
                    html += `<div class="rest-day">День отдыха</div>`;
                }
                // Future days with no activities: leave empty (workout not done yet)
            } else {
                for (const a of day.activities) {
                    const icon = SPORT_ICONS[a.type] || '\u{1F3C6}';
                    const label = sportLabel(a.type);
                    const metaParts = [];
                    if (a.duration) metaParts.push(a.duration);
                    if (a.icu_training_load != null) metaParts.push(`TSS ${a.icu_training_load}`);
                    if (a.average_hr != null) metaParts.push(`\u2764\uFE0F ${a.average_hr}`);
                    const meta = metaParts.join(' \u00B7 ');

                    const safeId = escapeHtml(a.id);
                    html += `<div class="activity-item">`;
                    html += `<div class="activity-row" id="row-${safeId}" onclick="toggleDetail('${safeId}')">`;
                    html += `<span class="sport-icon">${icon}</span>`;
                    html += `<div class="activity-info">`;
                    html += `<div class="activity-name">${escapeHtml(label)}</div>`;
                    if (meta) html += `<div class="activity-meta">${escapeHtml(meta)}</div>`;
                    html += `</div>`;
                    html += `<span class="chevron">\u25B6</span>`;
                    html += `</div></div>`;
                }
            }
            html += `</div>`;
        }

        container.innerHTML = html;
        loading.style.display = 'none';
        container.style.display = 'block';

        // Navigation limits: no future weeks, no weeks before earliest data
        document.getElementById('next-week').disabled = offset >= 0;
        document.getElementById('prev-week').disabled = data.has_prev === false;
    } catch (err) {
        console.error('Failed to load activities:', err);
        loading.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px 20px;">Не удалось загрузить активности.<br>Попробуйте позже.</div>';
    }
}

function updateSyncTime(isoStr) {
    const el = document.getElementById('sync-time');
    el.textContent = isoStr ? `Обновлено: ${relativeTime(isoStr)}` : 'Не синхронизировано';
}

async function syncActivities() {
    const btn = document.getElementById('sync-btn');
    const iconEl = document.getElementById('sync-icon');
    btn.disabled = true;
    iconEl.classList.add('spin');

    try {
        const result = await apiFetch('/api/jobs/sync-activities', { method: 'POST' });
        updateSyncTime(result.last_synced_at);
        await loadWeek(currentOffset);
    } catch (err) {
        console.error('Sync failed:', err);
        const msg = 'Ошибка синхронизации. Проверьте соединение.';
        if (tg?.showAlert) { tg.showAlert(msg); } else { alert(msg); }
    } finally {
        btn.disabled = false;
        iconEl.classList.remove('spin');
    }
}

document.getElementById('prev-week').addEventListener('click', () => loadWeek(currentOffset - 1));
document.getElementById('next-week').addEventListener('click', () => loadWeek(currentOffset + 1));
document.getElementById('sync-btn').addEventListener('click', syncActivities);

loadWeek(0);
</script>
</body>
</html>
