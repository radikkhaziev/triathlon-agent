<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- `apple-mobile-web-app-capable` is deprecated since iOS 17.4 in favour
         of `display: standalone` in the manifest (which we have). Kept the
         status-bar hint with `black-translucent` so the status bar reads as
         dark over our #0f0f17 background instead of the default white-with-
         dark-icons. Inert inside Telegram WebView but covers stand-alone iOS
         home-screen launches. Android Chrome uses `mobile-web-app-capable`. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#3b82f6" />
    <title>EndurAI</title>
    <meta name="description" content="Personal AI coach for endurance athletes. HRV analysis, training load tracking and race progress.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
