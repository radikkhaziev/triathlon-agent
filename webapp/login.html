<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — TriCoach AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1c1c27;
            --border: #2a2a3a;
            --text: #e8e8ed;
            --text-dim: #8888a0;
            --accent: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo { font-size: 48px; margin-bottom: 16px; }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .code-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 24px;
            font-family: 'Inter', monospace;
            font-weight: 600;
            letter-spacing: 8px;
            text-align: center;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            border-color: var(--accent);
        }

        .code-input::placeholder {
            letter-spacing: 4px;
            font-size: 16px;
            font-weight: 400;
            color: var(--text-dim);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            font-size: 14px;
            min-height: 20px;
        }

        .message.error { color: var(--red); }
        .message.success { color: var(--green); }

        .instructions {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .instructions p {
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .instructions code {
            background: var(--surface-2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--accent);
        }

        .already-auth {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .already-auth a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🏊‍♂️🚴‍♂️🏃‍♂️</div>
        <h1>TriCoach AI</h1>
        <p class="subtitle">Отправьте <code>/web</code> боту в Telegram,<br>затем введите полученный код</p>

        <form id="loginForm">
            <input type="text" class="code-input" id="codeInput"
                   maxlength="6" pattern="[0-9]{6}" inputmode="numeric"
                   placeholder="000000" autocomplete="off" autofocus>
            <button type="submit" class="submit-btn" id="submitBtn">Войти</button>
        </form>

        <div class="message" id="message"></div>

        <div class="instructions">
            <p>1. Откройте Telegram-бота</p>
            <p>2. Отправьте команду <code>/web</code></p>
            <p>3. Введите 6-значный код выше</p>
            <p>Код действует 5 минут</p>
        </div>

        <div class="already-auth" id="alreadyAuth" style="display:none">
            Вы уже авторизованы. <a href="/">Перейти на главную</a>
        </div>
    </div>

<script>
const API_BASE = window.location.origin;

// Check if already authenticated
const existingToken = localStorage.getItem('auth_token');
if (existingToken) {
    fetch(`${API_BASE}/api/auth/me`, {
        headers: { 'Authorization': `Bearer ${existingToken}` }
    })
    .then(r => r.json())
    .then(data => {
        if (data.authenticated) {
            document.getElementById('alreadyAuth').style.display = 'block';
        }
    })
    .catch(() => {});
}

const form = document.getElementById('loginForm');
const input = document.getElementById('codeInput');
const btn = document.getElementById('submitBtn');
const msg = document.getElementById('message');

// Auto-focus and filter non-digits
input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '').slice(0, 6);
    msg.textContent = '';
    msg.className = 'message';
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = input.value.trim();
    if (code.length !== 6) {
        msg.textContent = 'Введите 6-значный код';
        msg.className = 'message error';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Проверяю...';
    msg.textContent = '';

    try {
        const res = await fetch(`${API_BASE}/api/auth/verify-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || 'Ошибка авторизации');
        }

        const data = await res.json();
        localStorage.setItem('auth_token', data.token);
        msg.textContent = 'Успешно! Перенаправляю...';
        msg.className = 'message success';

        setTimeout(() => { window.location.href = '/'; }, 500);
    } catch (err) {
        msg.textContent = err.message;
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Войти';
        input.value = '';
        input.focus();
    }
});
</script>
</body>
</html>
