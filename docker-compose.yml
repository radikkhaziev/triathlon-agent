services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: triathlon-intervals
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # bot:
  #   build: .
  #   command: python -m bot.main
  #   env_file: .env
  #   depends_on:
  #     migrate:
  #       condition: service_completed_successfully
  #   restart: unless-stopped
  #   profiles:
  #     - polling

  api:
    build: .
    # --proxy-headers: the demo-mint per-IP rate limit keys on request.client.host;
    # without XFF parsing every visitor shares Caddy's IP (one bucket = trivial DoS
    # of the public demo button, zero per-attacker throttle).
    # forwarded-allow-ips is PINNED to the compose network gateway (host-side Caddy
    # reaches the published 127.0.0.1 port through it) — never "*": Caddy APPENDS to
    # X-Forwarded-For, and with "*" uvicorn would trust the attacker-supplied leftmost
    # entry (unlimited token mint). With a pinned trust list uvicorn ≥0.30 walks XFF
    # right-to-left and stops at the first untrusted hop = the real client IP.
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=${FORWARDED_ALLOW_IPS:-172.28.0.1}
    env_file: .env
    environment:
      TZ: ${TIMEZONE:-Europe/Belgrade}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - static_data:/app/static
    restart: unless-stopped

  worker:
    build: .
    # --queues default: explicit isolation from ml_retrain (issue #348). Without
    # --queues Dramatiq consumes ALL known queues, which would race ml-worker
    # for CPU-heavy XGBoost jobs and defeat the isolation.
    command: dramatiq tasks.actors --queues default
    env_file: .env
    environment:
      TZ: ${TIMEZONE:-Europe/Belgrade}
    # FIT files (tasks/actors/activities.py: static/fit-files/) and Telegram
    # avatars (tasks/actors/avatars.py: static/avatar/) write here — shared
    # with api so dashboard can serve them. Pre-existing latent gap, fixed
    # as part of #348 docker-compose cleanup.
    volumes:
      - static_data:/app/static
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  ml-worker:
    build: .
    # Isolated CPU pool for race-projection / progression model retraining
    # (issue #348). Sequential by construction: --threads 1 --processes 1 means
    # ML jobs run one-by-one in this container, no concurrent XGBoost trains.
    # Sun 03:00 Belgrade cron pushes N messages → ml-worker processes them
    # sequentially over 30-60 min without touching default worker pool.
    command: dramatiq tasks.actors --queues ml_retrain --threads 1 --processes 1
    env_file: .env
    environment:
      TZ: ${TIMEZONE:-Europe/Belgrade}
    volumes:
      - static_data:/app/static
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  landing:
    build: ./landing
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

# Fixed subnet so the api service can pin uvicorn's --forwarded-allow-ips to the
# gateway IP (see api.command). Host-published ports enter the network through it.
networks:
  default:
    ipam:
      config:
        - subnet: ${COMPOSE_NET_SUBNET:-172.28.0.0/16}
          gateway: ${COMPOSE_NET_GATEWAY:-172.28.0.1}

volumes:
  pgdata:
  redisdata:
  static_data:
